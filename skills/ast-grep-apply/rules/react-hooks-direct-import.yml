fix: React.useEffect($$$ARGS)
---
id: fragment-opening-name
language: tsx
rule:
  kind: identifier
  regex: ^Fragment$
  inside:
    kind: jsx_opening_element
fix: React.Fragment
---
id: fragment-closing-name
language: tsx
rule:
  kind: identifier
  regex: ^Fragment$
  inside:
    kind: jsx_closing_element
fix: React.Fragment
