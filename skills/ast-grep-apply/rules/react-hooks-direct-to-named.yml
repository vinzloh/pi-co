id: replace-react-reactnode
language: tsx
rule:
  any:
    - pattern:
        context: |
          interface X { prop: React.ReactNode }
        selector: nested_type_identifier
    - pattern:
        context: |
          type X = React.ReactNode
        selector: nested_type_identifier
    - pattern:
        context: |
          function x(): React.ReactNode {}
        selector: nested_type_identifier
    - pattern:
        context: |
          const x: React.ReactNode
        selector: nested_type_identifier
fix: ReactNode
---
id: usestate-with-type
language: tsx
rule:
  pattern: React.useState<$T>($$$ARGS)
fix: useState<$T>($$$ARGS)
---
id: usecontext-with-type
language: tsx
rule:
  pattern: React.createContext<$T>($$$ARGS)
fix: createContext<$T>($$$ARGS)


---
id: usestate-without-type
language: tsx
rule:
  pattern: React.useState($$$ARGS)
fix: useState($$$ARGS)

