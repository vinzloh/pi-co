# Replace literal array .includes() with arrayOf()
#
# This rule transforms patterns like:
#   ['a', 'b', 'c'].includes(value)
#
# Into:
#   arrayOf(value).includes(['a', 'b', 'c'])
#
# This is useful for TypeScript type narrowing and consistency with the
# project's preferred pattern for array membership checks.
#
# Example usage:
#   ast-grep scan --rule literal-array-includes.yml <glob-pattern>
#
# Or to apply the fix:
#   ast-grep scan --rule literal-array-includes.yml update-all <glob-pattern>
#

id: literal-array-includes
language: tsx
rule:
  pattern: "[$$$ELEMENTS].includes($ARG)"
fix: |
  arrayOf($ARG).includes([$$$ELEMENTS])
